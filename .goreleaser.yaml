---
version: 2

project_name: localzone-leaktest

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    targets:
      - linux_amd64
      - linux_arm64
      - darwin_arm64
      - darwin_amd64
      - windows_amd64
      - freebsd_amd64
      - openbsd_amd64
    # Stamp the tag itself (v-prefixed) so -V matches `go install` builds.
    ldflags:
      - -s -w -X main.version={{.Tag}}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  use: github-native
